<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tyrannosocial</title>
    <script>
      // GitHub Pages SPA redirect — encodes the full path into the query string
      // so the main index.html can restore it after loading.
      // Based on https://github.com/rafgraph/spa-github-pages
      var segmentCount = 1; // number of path segments in the repo name (1 for /tyranno-social)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
